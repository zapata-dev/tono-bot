# =========================================================================
# Brand configuration — Tractos y Max
# Este archivo define TODO lo que cambia entre marcas.
# Para crear un bot para otra marca, clona el repo y edita este archivo.
# =========================================================================

brand:
  name: "Tractos y Max"
  slug: "tractosymax"
  legal_name: "Tractos y Max"

bot:
  persona_name: "Adrian Jimenez"
  persona_title: "asesor"
  language: "es"
  max_sentences: 2
  use_emojis: false
  philosophy: "destrabar"

business:
  office_label: "Tlalnepantla, Edo Mex"
  office_full_address: "Camiones del Valle Tlalnepantla"
  office_sucursal_id: "camiones_del_valle"  # sucursal principal/fallback
  office_maps_url: "https://maps.app.goo.gl/v9KigGY3QVAxqwV17"  # ROTO — reemplazar con OFFICE_MAPS_URL en Cloud Run o actualizar camiones_del_valle en sucursales
  timezone: "America/Mexico_City"
  hours_weekdays: "Lunes a Viernes 9:00 a 18:00"
  hours_saturday: "Sábados 9:00 a 14:00"
  hours_sunday: "cerrado"
  closed_days: ["sunday"]

# =========================================================================
# SUCURSALES — Fuente de verdad para ubicaciones y links de Google Maps
#
# Prioridad: Google Sheets (SUCURSALES_CSV_URL) → este YAML (fallback local)
# Para agregar/quitar sucursales sin deploy: usa la pestaña "Sucursales" en
# el Google Sheet del inventario y configura SUCURSALES_CSV_URL en Cloud Run.
#
# Campos:
#   sucursal_id    : clave única snake_case (usada en columna sucursal_id del inventario)
#   nombre_display : nombre que verá el cliente en WhatsApp
#   ciudad / estado: para contexto del bot
#   maps_url       : URL canónica de Google Maps (preferida, permanente)
#   maps_url_short : link corto maps.app.goo.gl (respaldo)
#   activa         : true/false — false = no aparece, no rompe inventario existente
#
# PARA CAMBIAR UN LINK: edita maps_url o maps_url_short de la sucursal y haz deploy.
# Con Google Sheets configurado: edita la celda en la pestaña Sucursales, sin deploy.
# =========================================================================
sucursales:
  - sucursal_id: "camiones_del_valle"
    nombre_display: "Camiones del Valle"
    ciudad: "Tlalnepantla"
    estado: "Estado de México"
    maps_url: ""  # PENDIENTE: agregar URL canónica de Google Maps
    maps_url_short: "https://maps.app.goo.gl/v9KigGY3QVAxqwV17"  # ROTO — actualizar con link correcto
    direccion: "Camiones del Valle, Tlalnepantla, Estado de México"
    activa: true
    notas: "Sucursal principal — link de Maps pendiente de corrección"

  - sucursal_id: "zapata_guadalajara"
    nombre_display: "Zapata Camiones Guadalajara"
    ciudad: "Guadalajara"
    estado: "Jalisco"
    maps_url: ""
    maps_url_short: "https://maps.app.goo.gl/MY6oMWcFpffVL5KV8"
    activa: true

  - sucursal_id: "zapata_leon"
    nombre_display: "Zapata Camiones León"
    ciudad: "León"
    estado: "Guanajuato"
    maps_url: ""
    maps_url_short: "https://maps.app.goo.gl/2irBEbHeifECVLSF6"
    activa: true

  - sucursal_id: "zapata_queretaro"
    nombre_display: "Zapata Camiones Querétaro"
    ciudad: "Querétaro"
    estado: "Querétaro"
    maps_url: ""
    maps_url_short: "https://maps.app.goo.gl/NmqBHbrFmmTq3K9TA"
    activa: true

  - sucursal_id: "zapata_tlalnepantla"
    nombre_display: "Zapata Camiones Tlalnepantla"
    ciudad: "Tlalnepantla"
    estado: "Estado de México"
    maps_url: ""
    maps_url_short: "https://maps.app.goo.gl/1Jjixt8HKDrprWeQ7"
    activa: true

whatsapp:
  instance_name: "Maximo Cervantes 2"

crm:
  type: "monday"

behavior:
  message_accumulation_seconds: 8.0
  auto_reactivate_minutes: 60
  human_detection_window_seconds: 3
  inventory_refresh_seconds: 300
  campaigns_refresh_seconds: 300

llm:
  primary_provider: "gemini"
  primary_model: "gemini-2.5-flash-lite"
  fallback_model: "gpt-4o-mini"
  max_tokens: 450
  temperature: 0.3